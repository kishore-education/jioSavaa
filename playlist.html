<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist Manager - Music World</title>
    <!-- Tailwind CSS CDN for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/playlist.css">
</head>
<body class="app-body">
    <div class="ambient-bg" aria-hidden="true"></div>
    <div class="app-shell">
        <header class="topbar">
            <div class="brand">
                <div class="brand-mark">MW</div>
                <div class="brand-text">
                    <div class="brand-title">Music World</div>
                    <div class="brand-subtitle">Playlist command center</div>
                </div>
            </div>
            <nav class="top-nav">
                <a href="index.html" class="nav-link">Home</a>
                <a href="playlist.html" class="nav-link active">Playlists</a>
            </nav>
            <button id="top-search-icon" class="icon-btn" aria-label="Search">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
                </svg>
            </button>
        </header>

    <!-- Search Section (Collapsible) -->
    <div id="search-section" class="search-panel hidden transition-all duration-300 transform origin-top scale-y-0 opacity-0">
        <div class="search-inner">
            <div class="search-wrapper">
                <input
                    id="search-input"
                    type="text"
                    placeholder="Search within your playlists..."
                    class="search-input"
                    autocomplete="off"
                >
            </div>
            <button id="search-button" class="primary-btn">Search</button>
        </div>
    </div>

    <main class="playlist-shell">
        <div class="playlist-layout">
            <!-- Left sidebar - Playlist selection -->
            <div class="playlist-panel">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="panel-title">Your Playlists</h2>
                    <button id="create-playlist-btn" class="pill-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16" class="mr-1">
                            <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/>
                        </svg>
                        New
                    </button>
                </div>
                
                <div id="playlist-list" class="space-y-2">
                    <!-- Playlists will be loaded dynamically -->
                    <div class="animate-pulse">
                        <div class="h-10 bg-gray-700 rounded mb-2"></div>
                        <div class="h-10 bg-gray-700 rounded mb-2"></div>
                        <div class="h-10 bg-gray-700 rounded"></div>
                    </div>
                </div>
            </div>
            
            <!-- Main content - Current playlist -->
            <div class="playlist-panel playlist-panel--wide">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h2 id="current-playlist-name" class="panel-heading">Loading playlist...</h2>
                        <p id="playlist-stats" class="panel-subheading">0 songs, 0 minutes total</p>
                    </div>
                    <div class="action-group">
                        <button id="rename-playlist-btn" class="secondary-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16" class="mr-1">
                                <path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168l10-10zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207 11.207 2.5zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293l6.5-6.5zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325z"/>
                            </svg>
                            Rename
                        </button>
                        <button id="export-playlist-btn" class="secondary-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16" class="mr-1">
                                <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
                                <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/>
                            </svg>
                            Export
                        </button>
                        <button id="delete-playlist-btn" class="secondary-btn danger">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16" class="mr-1">
                                <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/>
                                <path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/>
                            </svg>
                            Delete
                        </button>
                    </div>
                </div>
                
                <!-- Search and filter for songs in the playlist -->
                <div class="mb-4">
                    <div class="relative">
                        <input 
                            id="playlist-search" 
                            type="text" 
                            placeholder="Search within this playlist..." 
                            class="search-input"
                        >
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16" class="absolute right-3 top-3 text-gray-500">
                            <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
                        </svg>
                    </div>
                </div>
                
                <!-- Song list in the current playlist -->
                <div class="overflow-hidden rounded-lg border border-gray-700">
                    <!-- Table header -->
                    <div class="playlist-table-header">
                        <div class="col-span-1">#</div>
                        <div class="col-span-6">Title</div>
                        <div class="col-span-3">Artist</div>
                        <div class="col-span-1 text-center">Duration</div>
                        <div class="col-span-1 text-right">Actions</div>
                    </div>
                    
                    <!-- Table body - songs will be loaded dynamically -->
                    <div id="song-list" class="playlist-table-body">
                        <div class="animate-pulse">
                            <div class="grid grid-cols-12 px-4 py-3">
                                <div class="col-span-1 h-5 bg-gray-700 rounded"></div>
                                <div class="col-span-6 h-5 bg-gray-700 rounded ml-2"></div>
                                <div class="col-span-3 h-5 bg-gray-700 rounded ml-2"></div>
                                <div class="col-span-1 h-5 bg-gray-700 rounded ml-2"></div>
                                <div class="col-span-1 h-5 bg-gray-700 rounded ml-2"></div>
                            </div>
                            <div class="grid grid-cols-12 px-4 py-3">
                                <div class="col-span-1 h-5 bg-gray-700 rounded"></div>
                                <div class="col-span-6 h-5 bg-gray-700 rounded ml-2"></div>
                                <div class="col-span-3 h-5 bg-gray-700 rounded ml-2"></div>
                                <div class="col-span-1 h-5 bg-gray-700 rounded ml-2"></div>
                                <div class="col-span-1 h-5 bg-gray-700 rounded ml-2"></div>
                            </div>
                            <div class="grid grid-cols-12 px-4 py-3">
                                <div class="col-span-1 h-5 bg-gray-700 rounded"></div>
                                <div class="col-span-6 h-5 bg-gray-700 rounded ml-2"></div>
                                <div class="col-span-3 h-5 bg-gray-700 rounded ml-2"></div>
                                <div class="col-span-1 h-5 bg-gray-700 rounded ml-2"></div>
                                <div class="col-span-1 h-5 bg-gray-700 rounded ml-2"></div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Empty state -->
                    <div id="empty-playlist-message" class="empty-playlist-message hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor" viewBox="0 0 16 16" class="mx-auto mb-4 opacity-50">
                            <path d="M9 13c0 1.105-1.12 2-2.5 2S4 14.105 4 13s1.12-2 2.5-2 2.5.895 2.5 2z"/>
                            <path fill-rule="evenodd" d="M9 3v10H8V3h1z"/>
                            <path d="M8 2.82a1 1 0 0 1 .804-.98l3-.6A1 1 0 0 1 13 2.22V4L8 5V2.82z"/>
                        </svg>
                        <h3 class="text-xl font-bold mb-2">This playlist is empty</h3>
                        <p class="mb-4">Go to the main page to search and add songs to this playlist</p>
                        <a href="index.html" class="primary-btn">
                            Search for songs
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modals -->
    <div id="modal-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center">
        <div id="modal-container" class="bg-gray-800 rounded-xl shadow-xl max-w-md w-full mx-4">
            <div class="p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 id="modal-title" class="text-xl font-bold">Modal Title</h3>
                    <button id="modal-close" class="text-gray-400 hover:text-white">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/>
                        </svg>
                    </button>
                </div>
                <div id="modal-content">
                    <!-- Content will be loaded dynamically -->
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>JioSavaa Music Player &copy; 2026</p>
    </footer>

    </div>

    <script src="js/playlist.js"></script>
</body>
</html>
